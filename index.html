<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Майчин Органайзър</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'DM Sans', sans-serif;
      background: linear-gradient(160deg, #FDE8F0 0%, #FDF8F4 50%, #E0F5EF 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 40px 32px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(212,104,138,0.15);
      max-width: 360px;
      width: 100%;
    }
    .logo { font-size: 3rem; margin-bottom: 16px; }
    h1 { font-size: 1.5rem; color: #D4688A; margin-bottom: 8px; }
    .subtitle { color: #8A6B6B; font-size: 0.9rem; margin-bottom: 28px; line-height: 1.5; }
    .signin-wrap { display: flex; justify-content: center; margin-bottom: 16px; }
    #status-box { display: none; border-radius: 16px; padding: 16px; margin-top: 16px; font-size: 0.85rem; }
    #status-box.loading { background: #FEF3DC; color: #8A6B6B; text-align: center; }
    #status-box.success { background: #E3F5E8; text-align: left; }
    #status-box.error { background: #FDE8E8; color: #E85D5D; }
    .user-name { font-weight: 700; color: #3D2B2B; font-size: 1rem; margin-bottom: 4px; }
    .user-email { color: #8A6B6B; font-size: 0.8rem; margin-bottom: 12px; }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      border-radius: 20px; padding: 6px 12px;
      font-size: 0.78rem; font-weight: 600; margin: 4px 2px;
    }
    .badge-green { background: #5CB878; color: white; }
    .badge-pink  { background: #F2A7C3; color: white; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">👶</div>
    <h1>Майчин Органайзър</h1>
    <p class="subtitle">Влез с твоя Google акаунт.<br>Данните ти се пазят в твоя Google Drive.</p>

    <div class="signin-wrap">
      <div id="g_id_onload"
        data-client_id="488308267310-ibfdaokrhpcq0mh8q2gf3jjnjrhii3fe.apps.googleusercontent.com"
        data-callback="handleLogin"
        data-auto_select="false"
        data-auto_prompt="false">
      </div>
      <div class="g_id_signin"
        data-type="standard"
        data-size="large"
        data-theme="outline"
        data-text="sign_in_with"
        data-shape="rectangular"
        data-logo_alignment="left">
      </div>
    </div>

    <div id="status-box">
      <div id="status-content"></div>
    </div>
  </div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxA6Tls010wYReh060sKWv2wzGgYIRtwuHcKp-QJU-BsLIQ8L2C1ozKvlHeChpKE4_CYw/exec';
    const CLIENT_ID = '488308267310-ibfdaokrhpcq0mh8q2gf3jjnjrhii3fe.apps.googleusercontent.com';

    /** Извиква се след успешен Google Sign-In */
    function handleLogin(response) {
      var user = parseJwt(response.credential);

      // Запазваме токена и данните на потребителя
      localStorage.setItem('id_token', response.credential);
      localStorage.setItem('token_exp', user.exp);
      localStorage.setItem('user_email', user.email);
      localStorage.setItem('user_name', user.name);
      localStorage.setItem('user_picture', user.picture || '');

      showStatus('loading', '⏳ Свързваме се с твоите данни...');

      // Тестваме връзката с GAS
      callApi('init', { country: navigator.language || '' })
        .then(function(result) {
          showStatus('success',
            '<div class="user-name">👋 ' + user.name + '</div>' +
            '<div class="user-email">' + user.email + '</div>' +
            '<span class="badge badge-green">✅ Данните са свързани</span>' +
            '<span class="badge badge-pink">🗂️ Google Drive активен</span>'
          );
          // TODO: Тук ще зареждаме главното приложение
          console.log('Таблица ID:', result.spreadsheetId);
        })
        .catch(function(err) {
          showStatus('error', '❌ Грешка при свързване: ' + err.message);
        });
    }

    /** Изпраща заявка към GAS API */
    function callApi(action, data) {
      var token = localStorage.getItem('id_token');
      return fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify({ action: action, token: token, data: data || {} }),
        redirect: 'follow'
      })
      .then(function(res) { return res.json(); })
      .then(function(json) {
        if (!json.success) throw new Error(json.error || 'Неизвестна грешка');
        return json.result;
      });
    }

    /** Показва съобщение */
    function showStatus(type, html) {
      var box = document.getElementById('status-box');
      box.className = type;
      box.style.display = 'block';
      document.getElementById('status-content').innerHTML = html;
    }

    /** Декодира JWT (само за четене, верификацията е в GAS) */
    function parseJwt(token) {
      var base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
      return JSON.parse(atob(base64));
    }

    // Изчистваме всички стари запазени токени за чист старт
    localStorage.removeItem('id_token');
    localStorage.removeItem('token_exp');
    localStorage.removeItem('user_email');
    localStorage.removeItem('user_name');
  </script>
</body>
</html>
