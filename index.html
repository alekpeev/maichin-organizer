<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Майчин Органайзър</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'DM Sans', sans-serif;
      background: linear-gradient(160deg, #FDE8F0 0%, #FDF8F4 50%, #E0F5EF 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 40px 32px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(212,104,138,0.15);
      max-width: 360px;
      width: 100%;
    }
    .logo { font-size: 3rem; margin-bottom: 16px; }
    h1 { font-size: 1.5rem; color: #D4688A; margin-bottom: 8px; }
    p { color: #8A6B6B; font-size: 0.9rem; margin-bottom: 32px; line-height: 1.5; }
    #user-info {
      display: none;
      background: #E0F5EF;
      border-radius: 16px;
      padding: 16px;
      margin-top: 20px;
    }
    #user-info p { margin: 0; color: #3D2B2B; font-weight: 600; }
    #user-info small { color: #8A6B6B; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">👶</div>
    <h1>Майчин Органайзър</h1>
    <p>Влез с твоя Google акаунт за да продължиш</p>

    <div id="g_id_onload"
      data-client_id="488308267310-ibfdaokrhpcq0mh8q2gf3jjnjrhii3fe.apps.googleusercontent.com"
      data-callback="handleLogin"
      data-auto_prompt="false">
    </div>
    <div class="g_id_signin"
      data-type="standard"
      data-size="large"
      data-theme="outline"
      data-text="sign_in_with"
      data-shape="rectangular"
      data-logo_alignment="left">
    </div>

    <div id="user-info">
      <p id="user-name"></p>
      <small id="user-email"></small>
    </div>
  </div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    /**
     * Обработва успешния Google логин.
     * credential е JWT токен с данните на потребителя.
     */
    function handleLogin(response) {
      const payload = parseJwt(response.credential);
      document.getElementById('user-name').textContent = '✅ ' + payload.name;
      document.getElementById('user-email').textContent = payload.email;
      document.getElementById('user-info').style.display = 'block';
    }

    /**
     * Декодира JWT токена без верификация (само за показване).
     * Верификацията ще става на сървъра (GAS).
     */
    function parseJwt(token) {
      const base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
      return JSON.parse(atob(base64));
    }
  </script>
</body>
</html>
