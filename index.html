<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Майчин Органайзър</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'DM Sans', sans-serif;
      background: linear-gradient(160deg, #FDE8F0 0%, #FDF8F4 50%, #E0F5EF 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 40px 32px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(212,104,138,0.15);
      max-width: 360px;
      width: 100%;
    }
    .logo { font-size: 3rem; margin-bottom: 16px; }
    h1 { font-size: 1.5rem; color: #D4688A; margin-bottom: 8px; }
    .subtitle { color: #8A6B6B; font-size: 0.9rem; margin-bottom: 28px; line-height: 1.5; }

    /* Центрираме Google бутона */
    .signin-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 16px;
    }

    #status-box {
      display: none;
      border-radius: 16px;
      padding: 16px;
      margin-top: 20px;
      text-align: left;
    }
    #status-box.loading {
      background: #FEF3DC;
      color: #8A6B6B;
      font-size: 0.85rem;
      text-align: center;
    }
    #status-box.success {
      background: #E3F5E8;
    }
    #status-box.error {
      background: #FDE8E8;
      color: #E85D5D;
      font-size: 0.85rem;
    }
    .user-name { font-weight: 700; color: #3D2B2B; font-size: 1rem; margin-bottom: 4px; }
    .user-email { color: #8A6B6B; font-size: 0.8rem; margin-bottom: 12px; }
    .access-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #5CB878;
      color: white;
      border-radius: 20px;
      padding: 6px 12px;
      font-size: 0.78rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">👶</div>
    <h1>Майчин Органайзър</h1>
    <p class="subtitle">Влез с твоя Google акаунт.<br>Данните ти ще се пазят в твоя Google Drive.</p>

    <div class="signin-wrap">
      <div id="g_id_onload"
        data-client_id="488308267310-ibfdaokrhpcq0mh8q2gf3jjnjrhii3fe.apps.googleusercontent.com"
        data-callback="handleLogin"
        data-auto_prompt="false">
      </div>
      <div class="g_id_signin"
        data-type="standard"
        data-size="large"
        data-theme="outline"
        data-text="sign_in_with"
        data-shape="rectangular"
        data-logo_alignment="left">
      </div>
    </div>

    <div id="status-box">
      <div id="status-content"></div>
    </div>
  </div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    const CLIENT_ID = '488308267310-ibfdaokrhpcq0mh8q2gf3jjnjrhii3fe.apps.googleusercontent.com';
    const SCOPES = [
      'https://www.googleapis.com/auth/spreadsheets',
      'https://www.googleapis.com/auth/drive.file'
    ].join(' ');

    let tokenClient;
    let currentUser = null;

    /** Инициализира клиента за access token (Sheets + Drive достъп) */
    function initTokenClient() {
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: handleTokenResponse
      });
    }

    /** Извиква се след успешен Google Sign-In */
    function handleLogin(response) {
      currentUser = parseJwt(response.credential);

      showStatus('loading', '⏳ Искаме достъп до твоя Google Drive...');

      // Искаме access token за Sheets и Drive
      // prompt:'' означава — не питай отново ако вече е дал разрешение
      tokenClient.requestAccessToken({ prompt: '' });
    }

    /** Извиква се когато получим access token */
    function handleTokenResponse(resp) {
      if (resp.error) {
        showStatus('error', 'Грешка: ' + resp.error + '. Моля опитай отново.');
        return;
      }

      // Запазваме token в sessionStorage (изчиства се при затваряне на браузъра)
      sessionStorage.setItem('access_token', resp.access_token);
      sessionStorage.setItem('token_expires', Date.now() + (resp.expires_in * 1000));
      sessionStorage.setItem('user_email', currentUser.email);
      sessionStorage.setItem('user_name', currentUser.name);

      showStatus('success', `
        <div class="user-name">👋 ${currentUser.name}</div>
        <div class="user-email">${currentUser.email}</div>
        <div class="access-badge">✅ Достъпът до Google Drive е активен</div>
      `);
    }

    /** Показва съобщение в status box */
    function showStatus(type, html) {
      const box = document.getElementById('status-box');
      const content = document.getElementById('status-content');
      box.className = type;
      box.style.display = 'block';
      content.innerHTML = html;
    }

    /** Декодира JWT токен (само за четене на данни, не за верификация) */
    function parseJwt(token) {
      const base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
      return JSON.parse(atob(base64));
    }

    // Инициализираме token client когато Google библиотеката се зареди
    window.addEventListener('load', function() {
      // Изчакваме Google библиотеката да е готова
      const interval = setInterval(function() {
        if (window.google && google.accounts) {
          initTokenClient();
          clearInterval(interval);
        }
      }, 100);
    });
  </script>
</body>
</html>
