<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Майчин Органайзър</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'DM Sans', sans-serif;
      background: linear-gradient(160deg, #FDE8F0 0%, #FDF8F4 50%, #E0F5EF 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 40px 32px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(212,104,138,0.15);
      max-width: 360px;
      width: 100%;
    }
    .logo { font-size: 3rem; margin-bottom: 16px; }
    h1 { font-size: 1.5rem; color: #D4688A; margin-bottom: 8px; }
    .subtitle { color: #8A6B6B; font-size: 0.9rem; margin-bottom: 32px; line-height: 1.5; }

    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      background: white;
      border: 1.5px solid #dadce0;
      border-radius: 24px;
      padding: 12px 20px;
      font-size: 0.95rem;
      font-weight: 500;
      color: #3c4043;
      cursor: pointer;
      text-decoration: none;
      transition: box-shadow 0.2s;
    }
    .google-btn:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
    .google-btn:active { background: #f8f9fa; }
    .google-logo {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    #status-box { display: none; border-radius: 16px; padding: 16px; margin-top: 20px; font-size: 0.85rem; }
    #status-box.loading { background: #FEF3DC; color: #8A6B6B; text-align: center; }
    #status-box.success { background: #E3F5E8; text-align: left; }
    #status-box.error { background: #FDE8E8; color: #E85D5D; }
    .user-name { font-weight: 700; color: #3D2B2B; font-size: 1rem; margin-bottom: 4px; }
    .user-email { color: #8A6B6B; font-size: 0.8rem; margin-bottom: 10px; }
    .badge { display: inline-flex; align-items: center; gap: 6px; border-radius: 20px; padding: 5px 10px; font-size: 0.75rem; font-weight: 600; background: #5CB878; color: white; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">👶</div>
    <h1>Майчин Органайзър</h1>
    <p class="subtitle">Влез с твоя Google акаунт.<br>Данните ти се пазят в твоя Google Drive.</p>

    <a class="google-btn" href="#" onclick="signIn(); return false;">
      <!-- Google G лого -->
      <svg class="google-logo" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Влез с Google
    </a>

    <div id="status-box">
      <div id="status-content"></div>
    </div>
  </div>

  <script>
    const CLIENT_ID = '488308267310-ibfdaokrhpcq0mh8q2gf3jjnjrhii3fe.apps.googleusercontent.com';
    const GAS_URL   = 'https://script.google.com/macros/s/AKfycbxA6Tls010wYReh060sKWv2wzGgYIRtwuHcKp-QJU-BsLIQ8L2C1ozKvlHeChpKE4_CYw/exec';
    const REDIRECT  = 'https://alekpeev.github.io/maichin-organizer/';

    /** Пренасочва потребителя към Google за вход */
    function signIn() {
      var nonce = Math.random().toString(36).substring(2) + Date.now();
      sessionStorage.setItem('oauth_nonce', nonce);

      var params = new URLSearchParams({
        client_id:     CLIENT_ID,
        redirect_uri:  REDIRECT,
        response_type: 'id_token',
        scope:         'openid email profile',
        nonce:         nonce,
        prompt:        'select_account'
      });

      window.location.href = 'https://accounts.google.com/o/oauth2/v2/auth?' + params;
    }

    /** При зареждане: проверяваме дали Google ни е върнал id_token в URL хеша */
    function checkCallback() {
      var hash = new URLSearchParams(window.location.hash.replace('#', '?').substring(1));
      var idToken = hash.get('id_token');

      if (!idToken) return;

      // Изчистваме URL адреса
      history.replaceState(null, '', window.location.pathname);

      showStatus('loading', '⏳ Свързваме се с твоите данни...');

      var user = parseJwt(idToken);
      localStorage.setItem('id_token', idToken);
      localStorage.setItem('token_exp', user.exp);
      localStorage.setItem('user_email', user.email);
      localStorage.setItem('user_name', user.name || user.email);

      callApi('init', { country: navigator.language || '' }, idToken)
        .then(function(result) {
          showStatus('success',
            '<div class="user-name">👋 ' + (user.name || user.email) + '</div>' +
            '<div class="user-email">' + user.email + '</div>' +
            '<span class="badge">✅ Данните са свързани</span>'
          );
        })
        .catch(function(err) {
          showStatus('error', '❌ ' + err.message);
        });
    }

    /** Изпраща заявка към GAS API */
    function callApi(action, data, token) {
      return fetch(GAS_URL, {
        method:   'POST',
        redirect: 'follow',
        body:     JSON.stringify({ action: action, token: token, data: data || {} })
      })
      .then(function(res) { return res.json(); })
      .then(function(json) {
        if (!json.success) throw new Error(json.error || 'Неизвестна грешка');
        return json.result;
      });
    }

    /** Декодира JWT (само за четене) */
    function parseJwt(token) {
      var base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
      return JSON.parse(atob(base64));
    }

    function showStatus(type, html) {
      var box = document.getElementById('status-box');
      box.className = type;
      box.style.display = 'block';
      document.getElementById('status-content').innerHTML = html;
    }

    // Проверяваме при зареждане
    checkCallback();
  </script>
</body>
</html>
