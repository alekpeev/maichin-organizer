<script>
'use strict';

// ---- STATE ----
let appData = {};
let currentSection = 'dashboard';
let pendingPhotoData = null;
let cachedMilestones = [];
let cachedMemories = [];
let cachedFeeding = [];
let cachedDoctors = [];
let cachedGrowth = [];
let cachedTeeth = [];
let cachedVaccineSchedule = [];
let cachedVaccineRecords = [];
let cachedCheckupSchedule = [];
let bulkSelection = {};
let bulkType = null;
let _busyHealth = false;

// ---- HELPERS ----
function today() { return new Date().toISOString().slice(0, 10); }
function esc(str) { if (!str) return ''; var div = document.createElement('div'); div.textContent = str; return div.innerHTML; }
function parseBgDate(dateStr) { if (!dateStr) return 0; var p = dateStr.split('.'); if (p.length === 3) return new Date(p[2], p[1] - 1, p[0]).getTime(); return new Date(dateStr).getTime() || 0; }
function formatDateForInput(dateStr) { if (!dateStr) return ''; if (dateStr.includes('.')) { var p = dateStr.split('.'); if (p.length === 3) return p[2] + '-' + p[1] + '-' + p[0]; } try { return new Date(dateStr).toISOString().slice(0, 10); } catch (e) { return ''; } }
function showToast(msg) { var t = document.getElementById('toast'); if (!t) return; t.textContent = msg; t.style.display = 'block'; clearTimeout(t._timer); t._timer = setTimeout(function () { t.style.display = 'none'; }, 3000); }
function setLoading(btn, on) { if (!btn) return; if (on) { btn.disabled = true; btn._orig = btn.textContent; btn.innerHTML = '<span class="spinner"></span> Запазване...'; } else { btn.disabled = false; if (btn._orig) btn.textContent = btn._orig; } }

// ---- PERMISSIONS (ПОПРАВЕНО v7.1) ----
function showPermissionsError() {
  var existing = document.getElementById('permissionsScreen');
  if (existing) return;
  var div = document.createElement('div');
  div.id = 'permissionsScreen';
  div.className = 'permissions-screen';
  div.innerHTML = '<div class="permissions-content">'
    + '<div class="permissions-icon">🔒</div>'
    + '<div class="permissions-title">Нужни са разрешения</div>'
    + '<div class="permissions-text">За да работи Майчин Органайзър, трябва да разрешиш достъп до <strong>Google Sheets</strong> и <strong>Google Drive</strong>.<br><br>Натисни бутона долу — ще се отвори нов прозорец, в който ще видиш списък с разрешения.<br><br>Избери <strong>"Allow / Разреши"</strong> на ВСИЧКИ.</div>'
    + '<button class="permissions-btn" onclick="requestPermissionsViaPopup()">🔓 Дай разрешения</button>'
    + '<div style="margin-top:16px;font-size:0.78rem;color:#B09898;line-height:1.5">'
    + 'След като дадеш разрешенията — затвори новия прозорец<br>и се върни в приложението. То ще се обнови автоматично.'
    + '</div>'
    + '</div>';
  document.body.appendChild(div);
}

function requestPermissionsViaPopup() {
  try {
    if (window.parent && window.parent !== window) {
      window.parent.postMessage({ type: 'MO_REQUEST_AUTH' }, '*');
    } else {
      window.open(location.origin + location.pathname.replace(/\/exec.*/, '/exec') + '?pwa_auth=true', '_blank');
    }
    var ps = document.getElementById('permissionsScreen');
    if (ps) {
      ps.innerHTML = '<div class="permissions-content">'
        + '<div class="permissions-icon">🔄</div>'
        + '<div class="permissions-title">Изчаквам разрешенията...</div>'
        + '<div class="permissions-text">Отвори се нов прозорец/таб с Google. Влез там, дай разрешенията, и се върни тук.</div>'
        + '<button class="permissions-btn" onclick="recheckAuth()">✓ Готово, провери</button>'
        + '<div style="margin-top:14px"><button onclick="location.reload()" style="background:none;border:none;color:#8A6B6B;text-decoration:underline;font-size:0.85rem;cursor:pointer;font-family:inherit">Презареди страницата</button></div>'
        + '</div>';
    }
  } catch (e) {
    showToast('⚠️ ' + e.message);
  }
}

function recheckAuth() {
  var ps = document.getElementById('permissionsScreen');
  if (ps) {
    ps.innerHTML = '<div class="permissions-content">'
      + '<div class="permissions-icon">⏳</div>'
      + '<div class="permissions-title">Проверявам...</div>'
      + '<div class="permissions-text">Изчакай момент.</div>'
      + '</div>';
  }
  try {
    google.script.run
      .withSuccessHandler(function (r) {
        if (r && r.success) {
          var pe = document.getElementById('permissionsScreen');
          if (pe) pe.remove();
          loadDashboard();
        } else {
          var pe2 = document.getElementById('permissionsScreen');
          if (pe2) pe2.remove();
          showPermissionsError();
        }
      })
      .withFailureHandler(function () {
        var pe = document.getElementById('permissionsScreen');
        if (pe) pe.remove();
        showPermissionsError();
      })
      .initializeApp();
  } catch (e) {
    var pe = document.getElementById('permissionsScreen');
    if (pe) pe.remove();
    showPermissionsError();
  }
}

// ---- SORT/FILTER ----
function getSortFilterHTML(id, opts, currentSort, currentFilter) {
  var sortOpts = opts.sorts.map(function (s) { var sel = (currentSort === s.value || (!currentSort && s.default)) ? ' selected' : ''; return '<option value="' + s.value + '"' + sel + '>' + s.label + '</option>'; }).join('');
  var filterHtml = '';
  if (opts.filters && opts.filters.length) { filterHtml = '<select class="sort-select" onchange="applyFilter(\'' + id + '\',this.value)">' + opts.filters.map(function (f) { var sel = (currentFilter === f.value) ? ' selected' : ''; return '<option value="' + f.value + '"' + sel + '>' + f.label + '</option>'; }).join('') + '</select>'; }
  return '<div class="sort-filter-bar"><select class="sort-select" onchange="applySort(\'' + id + '\',this.value)">' + sortOpts + '</select>' + filterHtml + '</div>';
}
var currentSorts = {};
var currentFilters = {};
function applySort(id, val) { currentSorts[id] = val; var r = { milestones: function(){renderMilestones(cachedMilestones,val,currentFilters[id])}, memories: function(){renderMemories(cachedMemories,val)}, feeding: function(){renderFeeding(cachedFeeding,val,currentFilters[id])}, doctors: function(){renderDoctors(cachedDoctors,val)}, growth: function(){renderGrowth(cachedGrowth,val)} }; if (r[id]) r[id](); }
function applyFilter(id, val) { currentFilters[id] = val; var r = { milestones: function(){renderMilestones(cachedMilestones,currentSorts[id],val)}, feeding: function(){renderFeeding(cachedFeeding,currentSorts[id],val)} }; if (r[id]) r[id](); }
function sortData(data, by) { var s = data.slice(); switch (by) { case 'date-new': s.sort(function(a,b){return parseBgDate(b.date)-parseBgDate(a.date);}); break; case 'date-old': s.sort(function(a,b){return parseBgDate(a.date)-parseBgDate(b.date);}); break; case 'name-az': s.sort(function(a,b){ return (a.event||a.title||a.food||a.name||'').toLowerCase().localeCompare((b.event||b.title||b.food||b.name||'').toLowerCase(),'bg'); }); break; case 'category': s.sort(function(a,b){ return (a.category||a.specialty||'').localeCompare(b.category||b.specialty||'','bg'); }); break; } return s; }

// ---- INIT (ПОПРАВЕНО v7.1) ----
window.addEventListener('load', function () {
  setTimeout(function () {
    try {
      google.script.run
        .withSuccessHandler(function (r) {
          if (r && r.success) loadDashboard();
          else {
            var errMsg = (r && r.error) || 'Грешка при инициализация';
            if (errMsg.toLowerCase().indexOf('permission') !== -1
                || errMsg.toLowerCase().indexOf('authorization') !== -1
                || errMsg.indexOf('разрешение') !== -1
                || errMsg.indexOf('create') !== -1
                || errMsg.indexOf('scope') !== -1
                || errMsg.indexOf('You do not have') !== -1) {
              hideSplash(); showPermissionsError();
            } else { showToast('⚠️ ' + errMsg); hideSplash(); }
          }
        })
        .withFailureHandler(function (e) {
          var errMsg = (e && e.message) || '';
          if (errMsg.toLowerCase().indexOf('permission') !== -1
              || errMsg.toLowerCase().indexOf('authorization') !== -1
              || errMsg.indexOf('ScriptError') !== -1
              || errMsg.indexOf('scope') !== -1) {
            hideSplash(); showPermissionsError();
          } else { showToast('⚠️ ' + errMsg); hideSplash(); }
        })
        .initializeApp();
    } catch (e) { showToast('⚠️ ' + e.message); hideSplash(); }
  }, 600);
});

function hideSplash() { var s = document.getElementById('splash'); if (!s) return; s.classList.add('hide'); setTimeout(function () { s.style.display = 'none'; var a = document.getElementById('app'); if (a) a.style.display = 'block'; }, 500); }

// ============================================================
// DASHBOARD
// ============================================================
function loadDashboard() {
  google.script.run.withSuccessHandler(function (d) {
    appData = d || {};
    if (!d || !d.profile || !d.profile['Име на бебето']) { hideSplash(); renderDashboard(d || {}); return; }
    renderDashboard(d); hideSplash();
  }).withFailureHandler(function (e) { hideSplash(); showToast('⚠️ ' + e.message); }).getDashboardData();
}

function renderDashboard(data) {
  if (!data) data = {};
  var name = (data.profile && data.profile['Име на бебето']) ? data.profile['Име на бебето'] : 'Добре дошла!';
  document.getElementById('dashName').textContent = name;

  var heroPhoto = document.getElementById('heroBabyPhoto');
  if (heroPhoto) {
    var photoUrl = (data.profile && data.profile['Снимка']) ? data.profile['Снимка'].trim() : '';
    if (photoUrl && photoUrl.length > 5) { var img = document.createElement('img'); img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:50%'; img.onerror = function() { heroPhoto.innerHTML = '🍼'; }; img.src = photoUrl; heroPhoto.innerHTML = ''; heroPhoto.appendChild(img); }
  }

  if (data.age) {
    var a = data.age, ageStr;
    if (a.totalDays < 30) { ageStr = a.totalDays + (a.totalDays === 1 ? ' ден' : ' дни'); }
    else if (a.years === 0) { ageStr = a.totalMonths + (a.totalMonths === 1 ? ' месец' : ' месеца'); if (a.days > 0) ageStr += ' и ' + a.days + ' дни'; }
    else { ageStr = a.years + (a.years === 1 ? ' година' : ' години'); if (a.months > 0) ageStr += ' и ' + a.months + (a.months === 1 ? ' месец' : ' мес.'); }
    document.getElementById('dashAge').textContent = ageStr;
  } else { document.getElementById('dashAge').textContent = 'Въведи рождена дата в Профил'; }

  var cNotes = document.getElementById('cardNotes'), cNotesInfo = document.getElementById('cardNotesInfo');
  if (cNotes && cNotesInfo) {
    cNotes.className = 'dash-card';
    var nc = data.activeNotesCount || 0;
    var hasHigh = data.activeNotes && data.activeNotes.some(function(n){return n.priority==='Високо';});
    if (hasHigh) { cNotes.classList.add('card-red'); cNotesInfo.textContent = nc + ' активни (спешни!)'; }
    else if (nc > 0) { cNotes.classList.add('card-yellow'); cNotesInfo.textContent = nc + ' активни'; }
    else { cNotes.classList.add('card-mint'); cNotesInfo.textContent = 'Няма бележки'; }
  }

  var cUp = document.getElementById('cardUpcoming'), cUpInfo = document.getElementById('cardUpcomingInfo');
  if (cUp && cUpInfo) {
    cUp.className = 'dash-card';
    var overdue = data.upcomingEvents ? data.upcomingEvents.filter(function(e){return e.status==='overdue';}).length : 0;
    var upcoming = data.upcomingEvents ? data.upcomingEvents.length : 0;
    if (overdue > 0) { cUp.classList.add('card-red'); cUpInfo.textContent = overdue + ' просрочени!'; }
    else if (upcoming > 0) { cUp.classList.add('card-yellow'); cUpInfo.textContent = upcoming + ' събития'; }
    else { cUp.classList.add('card-mint'); cUpInfo.textContent = 'Всичко ок'; }
  }

  var cHealth = document.getElementById('cardHealth'), cHealthInfo = document.getElementById('cardHealthInfo');
  if (cHealth && cHealthInfo) {
    cHealth.className = 'dash-card';
    if (data.overdueVaccines > 0) { cHealth.classList.add('card-red'); cHealthInfo.textContent = data.overdueVaccines + ' просрочени ваксини'; }
    else if (data.nextVaccine) { cHealth.classList.add('card-lav'); cHealthInfo.textContent = data.nextVaccine.name + ' — ' + data.nextVaccine.dueDate; }
    else { cHealth.classList.add('card-green'); cHealthInfo.textContent = 'Всичко ок'; }
  }

  var cMem = document.getElementById('cardMemories'), cMemInfo = document.getElementById('cardMemoriesInfo');
  if (cMem && cMemInfo) { cMem.className = 'dash-card card-pink'; cMemInfo.textContent = (data.memoriesCount || 0) + ' спомена'; }

  var cMil = document.getElementById('cardMilestones'), cMilInfo = document.getElementById('cardMilestonesInfo');
  if (cMil && cMilInfo) { cMil.className = 'dash-card card-peach'; cMilInfo.textContent = (data.milestonesCount || 0) + ' постижения'; }

  var cGr = document.getElementById('cardGrowth'), cGrInfo = document.getElementById('cardGrowthInfo');
  if (cGr && cGrInfo) { cGr.className = 'dash-card card-lav'; cGrInfo.textContent = (data.lastGrowth && data.lastGrowth.weight) ? 'Последно: ' + data.lastGrowth.weight + ' кг' : 'Няма данни'; }

  var badge = document.getElementById('navHealthBadge');
  if (badge) { if (data.overdueVaccines > 0) { badge.textContent = data.overdueVaccines; badge.style.display = 'flex'; } else badge.style.display = 'none'; }
  var nbadge = document.getElementById('navNotesBadge');
  if (nbadge) { if (data.activeNotesCount > 0) { nbadge.textContent = data.activeNotesCount; nbadge.style.display = 'flex'; } else nbadge.style.display = 'none'; }

  var emBtn = document.getElementById('emergencyHeaderBtn');
  if (emBtn) { emBtn.style.display = data.pediatricianPhone ? 'flex' : 'none'; }

  appData.pediatricianPhone = data.pediatricianPhone || '';
  appData.pediatricianName = data.pediatricianName || '';
}

function confirmEmergencyCall() {
  var phone = (appData.pediatricianPhone || '').trim();
  var name = appData.pediatricianName || 'Педиатър';
  if (!phone) { showToast('⚠️ Няма телефон на педиатъра в Профил'); return; }
  document.getElementById('emergencyConfirmName').textContent = name;
  document.getElementById('emergencyConfirmPhone').textContent = phone;
  document.getElementById('emergencyCallLink').href = 'tel:' + phone.replace(/\s/g, '');
  document.getElementById('emergencyModal').style.display = 'flex';
}

function showSection(name) {
  currentSection = name;
  document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active');});
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active');});
  var sec = document.getElementById('sec-' + name); if (sec) sec.classList.add('active');
  var btn = document.querySelector('[data-section="'+name+'"]'); if (btn) btn.classList.add('active');
  var loaders = { dashboard:loadDashboard, milestones:loadMilestones, health:loadHealthSection, growth:loadGrowth, memories:loadMemories, feeding:loadFeeding, doctors:loadDoctors, notes:loadNotes, profile:loadProfile };
  if (loaders[name]) loaders[name]();
  window.scrollTo(0,0);
}

// ============================================================
// HEALTH SECTION
// ============================================================
var currentHealthTab = 'vaccines';
function loadHealthSection() { switchHealthTab(currentHealthTab); }
function switchHealthTab(tab) {
  currentHealthTab = tab;
  document.querySelectorAll('.health-tabs-row .tab').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('.health-tabs-row .tab').forEach(function(t){if(t.getAttribute('data-htab')===tab)t.classList.add('active');});
  document.querySelectorAll('.health-tab-content').forEach(function(c){c.classList.remove('active');});
  var content = document.getElementById('healthTab-' + tab);
  if (content) content.classList.add('active');
  var loaders = { vaccines: loadVaccines, allergies: loadAllergies, checkups: loadCheckups, illnesses: loadIllnesses, teeth: loadTeeth };
  if (loaders[tab]) loaders[tab]();
}

function loadVaccines() {
  if (_busyHealth) return;
  _busyHealth = true;
  var el = document.getElementById('vaccineList'); if (el) el.innerHTML = '<div class="text-center mt-16"><span class="spinner"></span></div>';
  google.script.run.withSuccessHandler(function(data){ _busyHealth = false; renderVaccines(data); }).withFailureHandler(function(e){ _busyHealth = false; showToast('⚠️ '+e.message); }).getHealth();
}

function renderVaccines(data) {
  if (!data) return;
  cachedVaccineSchedule = (data.schedule && data.schedule.length) ? data.schedule : [];
  cachedVaccineRecords = (data.vaccines && data.vaccines.length) ? data.vaccines : [];
  var el = document.getElementById('vaccineList'); if (!el) return;
  if (!cachedVaccineSchedule.length) { el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">❤️</div><div class="empty-state-text">Въведи дата на раждане в Профил</div><button class="empty-state-btn" onclick="showSection(\'profile\')">Отвори Профил</button></div>'; return; }
  var markable = cachedVaccineSchedule.filter(function(v){ return v.status === 'overdue' || v.status === 'upcoming'; });
  var bulkBar = '';
  if (markable.length >= 2) {
    bulkBar = '<div class="bulk-mark-bar" onclick="openBulkMarkModal(\'vaccine\')"><span class="bulk-icon">📋</span><div class="bulk-text"><div class="bulk-title">Масово отбележи направени</div><div class="bulk-sub">Ако ваксините са правени преди активиране на профила</div></div><span class="bulk-arrow">›</span></div>';
  }
  var items = cachedVaccineSchedule.map(function(v) {
    var icon, cls, dateText, actionBtn = '', itemClickAttr = '';
    var nameEsc = esc(v.name).replace(/'/g, "\\'");
    if (v.status === 'done') { icon = '✅'; cls = 'done'; dateText = 'Поставена: ' + esc(v.doneDate || ''); if (v.doneDoctor) dateText += ' • ' + esc(v.doneDoctor); itemClickAttr = ' onclick="openVaccineDetailModal(\'' + nameEsc + '\')" style="cursor:pointer"'; }
    else if (v.status === 'overdue') { icon = '🔴'; cls = 'overdue'; dateText = '📅 ' + esc(v.dueDate) + ' — <span style="color:var(--red);font-weight:600">' + Math.abs(v.diffDays) + ' дни просрочена!</span>'; actionBtn = '<button class="mark-done-btn" onclick="event.stopPropagation();openVaccineDoneModal(\'' + nameEsc + '\',\'' + esc(v.dueDateISO || '') + '\')">Отбележи</button>'; }
    else if (v.status === 'upcoming') { icon = '🟡'; cls = 'upcoming'; dateText = '📅 ' + esc(v.dueDate) + ' — <span style="color:var(--yellow);font-weight:500">след ' + v.diffDays + ' дни</span>'; actionBtn = '<button class="mark-done-btn" onclick="event.stopPropagation();openVaccineDoneModal(\'' + nameEsc + '\',\'' + esc(v.dueDateISO || '') + '\')">Отбележи</button>'; }
    else { icon = '⏳'; cls = 'future'; dateText = '📅 ' + esc(v.dueDate); }
    return '<div class="vaccine-item ' + cls + '"' + itemClickAttr + '><span class="vaccine-status">' + icon + '</span><div class="vaccine-info"><div class="vaccine-name">' + esc(v.name) + '</div><div class="vaccine-date">' + dateText + '</div>' + (v.status === 'done' && v.doneReaction ? '<div class="vaccine-done-info">Реакция: ' + esc(v.doneReaction) + '</div>' : '') + '</div>' + actionBtn + '</div>';
  }).join('');
  el.innerHTML = bulkBar + items;
}

function openVaccineDoneModal(name, planned) { openModal('vaccine'); setTimeout(function(){ var n = document.getElementById('f_vname'); if (n) { n.value = name; n.readOnly = true; } var p = document.getElementById('f_vplanned'); if (p && planned) p.value = planned; }, 100); }

function openVaccineDetailModal(name) {
  var v = cachedVaccineSchedule.filter(function(x){ return x.name === name; })[0];
  if (!v || v.status !== 'done') { showToast('⚠️ Няма данни за тази ваксина'); return; }
  var record = cachedVaccineRecords.filter(function(r){ return r.name === name; })[0] || {};
  var nameEsc = esc(name).replace(/'/g, "\\'");
  var html = '';
  html += '<div class="detail-field"><div class="detail-field-label">Ваксина</div><div class="detail-field-value">' + esc(v.name) + '</div></div>';
  html += '<div class="detail-field"><div class="detail-field-label">Дата на поставяне</div><div class="detail-field-value">' + esc(v.doneDate || record.done || '—') + '</div></div>';
  if (v.doneDoctor || record.doctor) html += '<div class="detail-field"><div class="detail-field-label">Лекар</div><div class="detail-field-value">' + esc(v.doneDoctor || record.doctor) + '</div></div>';
  if (v.doneReaction || record.reaction) html += '<div class="detail-field"><div class="detail-field-label">Реакция</div><div class="detail-field-value">' + esc(v.doneReaction || record.reaction) + '</div></div>';
  if (record.notes) html += '<div class="detail-field"><div class="detail-field-label">Бележки</div><div class="detail-field-value">' + esc(record.notes) + '</div></div>';
  html += '<button class="save-btn" style="margin-top:14px" onclick="openVaccineEditModal(\'' + nameEsc + '\')">✏️ Редактирай</button>';
  html += '<button class="save-btn btn-danger" style="margin-top:8px" onclick="deleteVaccineRecordConfirm(\'' + nameEsc + '\')">🗑️ Изтрий запис</button>';
  document.getElementById('formModalTitle').textContent = '✅ Поставена ваксина';
  document.getElementById('formModalBody').innerHTML = html;
  document.getElementById('formModal').style.display = 'flex';
}

function openVaccineEditModal(name) {
  var v = cachedVaccineSchedule.filter(function(x){ return x.name === name; })[0];
  var record = cachedVaccineRecords.filter(function(r){ return r.name === name; })[0] || {};
  if (!v) return;
  var doneISO = formatDateForInput(v.doneDate || record.done || '');
  var nameEsc = esc(name).replace(/'/g, "\\'");
  var html = '';
  html += '<div class="form-group"><label>Ваксина</label><input type="text" value="' + esc(v.name) + '" readonly></div>';
  html += '<div class="form-group"><label>Дата на поставяне</label><input type="date" id="ef_vdone" value="' + doneISO + '"></div>';
  html += '<div class="form-group"><label>Лекар</label><input type="text" id="ef_vdoc" value="' + esc(v.doneDoctor || record.doctor || '') + '"></div>';
  html += '<div class="form-group"><label>Реакция</label><select id="ef_vreact"><option value="">Без реакция</option>' + ['Лека температура','Зачервяване','Подуване','Раздразнителност'].map(function(r){ var cur = v.doneReaction || record.reaction || ''; return '<option' + (cur === r ? ' selected' : '') + '>' + r + '</option>'; }).join('') + '</select></div>';
  html += '<div class="form-group"><label>Бележки</label><input type="text" id="ef_vnotes" value="' + esc(record.notes || '') + '"></div>';
  html += '<button class="save-btn" onclick="saveVaccineEdit(\'' + nameEsc + '\')">💾 Запази промените</button>';
  html += '<button class="save-btn btn-secondary" style="margin-top:8px" onclick="openVaccineDetailModal(\'' + nameEsc + '\')">← Назад</button>';
  document.getElementById('formModalTitle').textContent = '✏️ Редактирай ваксина';
  document.getElementById('formModalBody').innerHTML = html;
}

function saveVaccineEdit(name) {
  var data = { done: document.getElementById('ef_vdone').value, doctor: document.getElementById('ef_vdoc').value.trim(), reaction: document.getElementById('ef_vreact').value, notes: document.getElementById('ef_vnotes').value.trim() };
  if (!data.done) { showToast('⚠️ Въведи дата'); return; }
  var btn = document.querySelector('#formModalBody .save-btn'); setLoading(btn, true);

    html += '<use href="#ltp" style="fill:' + s.fill + ';stroke:' + s.stroke + ';stroke-width:' + s.sw + (s.dash ? ';stroke-dasharray:3' : '') + '"/>';
    if (s.dot) html += '<circle cx="0" cy="2" r="4" fill="' + s.dot + '"/>';
    html += '</g>';
  });
  html += '</g></svg></div>';
  var milkCount = data.filter(function(t){return t.status==='milk'||t.status==='milk_cavity'||t.status==='milk_filling';}).length;
  var permCount = data.filter(function(t){return t.status==='permanent'||t.status==='perm_cavity'||t.status==='perm_filling';}).length;
  var fallenCount = data.filter(function(t){return t.status==='fallen';}).length;
  html += '<div style="text-align:center;margin-top:8px;font-size:0.8rem;color:var(--text-s)">Млечни: <strong>' + milkCount + '</strong>/20 • Постоянни: <strong>' + permCount + '</strong> • Паднали: <strong>' + fallenCount + '</strong></div>';
  el.innerHTML = html;
}

function getToothStyle(t) {
  if (!t || t.status === 'not_erupted') return { fill: '#e8e8e8', stroke: '#ccc', sw: 1.5 };
  switch(t.status) {
    case 'milk': return { fill: '#FFE082', stroke: '#FFC107', sw: 2 };
    case 'milk_cavity': return { fill: '#FFE082', stroke: '#FFC107', sw: 2, dot: '#E53935' };
    case 'milk_filling': return { fill: '#FFE082', stroke: '#FFC107', sw: 2, dot: '#7B1FA2' };
    case 'fallen': return { fill: '#FDE8F0', stroke: '#F2A7C3', sw: 1.5, dash: true };
    case 'permanent': return { fill: '#BBDEFB', stroke: '#1976D2', sw: 2 };
    case 'perm_cavity': return { fill: '#BBDEFB', stroke: '#1976D2', sw: 2, dot: '#E53935' };
    case 'perm_filling': return { fill: '#BBDEFB', stroke: '#1976D2', sw: 2, dot: '#7B1FA2' };
    default: return { fill: '#e8e8e8', stroke: '#ccc', sw: 1.5 };
  }
}

function getReloadSection(t){return{achievement:'milestones',vaccine:'health',growth:'growth',memory:'memories',feeding:'feeding',doctor:'doctors',note:'notes',allergy:'health',checkup_done:'health',checkup:'health',illness:'health'}[t]||null;}

function validateForm(t,d){
  if(t==='achievement'&&!d.event)return 'Въведи събитие';
  if(t==='vaccine'&&!d.name)return 'Въведи ваксина';
  if(t==='vaccine'&&!d.done)return 'Въведи дата';
  if(t==='growth'&&!d.weight&&!d.height&&!d.head)return 'Въведи поне едно измерване';
  if(t==='memory'&&!d.title)return 'Въведи заглавие';
  if(t==='feeding'&&!d.food)return 'Въведи храна';
  if(t==='doctor'&&!d.name)return 'Въведи име';
  if(t==='note'&&!d.text)return 'Въведи текст';
  if(t==='allergy'&&!d.what)return 'Въведи алерген';
  if(t==='checkup_done'&&!d.done)return 'Въведи дата';
  if(t==='checkup'&&!d.name)return 'Въведи име на прегледа';
  if(t==='illness'&&!d.illness)return 'Въведи заболяване';
  return null;
}

function openModal(type){var form=getFormHTML(type);if(!form)return;document.getElementById('formModalTitle').textContent=form.title;document.getElementById('formModalBody').innerHTML=form.html+'<button class="save-btn" onclick="submitForm(\''+type+'\')">💾 Запази</button>';document.getElementById('formModal').style.display='flex';setTimeout(function(){var fi=document.querySelector('#formModalBody input[type="text"]');if(fi&&!fi.readOnly)fi.focus();},200);}

function submitForm(type){
  var data=getFormData(type);if(!data)return;
  var err=validateForm(type,data);if(err){showToast('⚠️ '+err);return;}
  var fn=getServerFunction(type);if(!fn)return;
  var btn=document.querySelector('#formModalBody .save-btn');setLoading(btn,true);
  if(pendingPhotoData&&pendingPhotoData.base64){showToast('📷 Качвам снимката...');google.script.run.withSuccessHandler(function(r){if(r&&r.success){data.photo=r.url;pendingPhotoData=null;_save(fn,data,type,btn);}else{setLoading(btn,false);showToast('⚠️ '+(r.error||'Грешка'));}}).withFailureHandler(function(e){setLoading(btn,false);showToast('⚠️ '+e.message);}).uploadPhoto(pendingPhotoData.base64,pendingPhotoData.fileName,pendingPhotoData.mimeType);}
  else _save(fn,data,type,btn);
}

function _save(fn,data,type,btn){
  google.script.run.withSuccessHandler(function(r){setLoading(btn,false);if(r&&r.success===false){showToast('⚠️ '+(r.error||'Грешка'));return;}closeModal('form');showToast('✅ Записано!');var sec=getReloadSection(type);if(sec==='health')loadHealthSection();else{var loaders={milestones:loadMilestones,growth:loadGrowth,memories:loadMemories,feeding:loadFeeding,doctors:loadDoctors,notes:loadNotes};if(loaders[sec])loaders[sec]();}if(type==='achievement'||type==='memory'||type==='growth'||type==='vaccine'||type==='illness'||type==='checkup_done')loadDashboard();}).withFailureHandler(function(e){setLoading(btn,false);showToast('⚠️ '+e.message);})[fn](data);
}

function getPhotoUploadHTML(id){return '<div id="'+id+'_wrap"><div class="photo-upload-area" id="'+id+'_area" onclick="triggerGallery(\''+id+'\')"><div class="photo-upload-icon">📷</div><div class="photo-upload-text">Натисни за снимка</div><div class="photo-upload-hint">Камера, галерия или линк</div></div><div class="photo-upload-actions"><button type="button" class="photo-action-btn" onclick="triggerCamera(\''+id+'\')"><span class="pa-icon">📷</span> Камера</button><button type="button" class="photo-action-btn" onclick="triggerGallery(\''+id+'\')"><span class="pa-icon">🖼️</span> Галерия</button><button type="button" class="photo-action-btn" onclick="toggleUrlInput(\''+id+'\')"><span class="pa-icon">🔗</span> Линк</button></div><div class="photo-url-input" id="'+id+'_url_wrap"><input type="url" id="'+id+'_url" style="border:1.5px solid var(--pink-l);border-radius:var(--r-s);padding:10px 12px;font-size:0.85rem;width:100%;font-family:DM Sans,sans-serif;margin-top:8px" placeholder="https://drive.google.com/..."></div><input type="file" id="'+id+'_file" accept="image/*" style="display:none" onchange="handleFileSelect(event,\''+id+'\')"><input type="file" id="'+id+'_camera" accept="image/*" capture="environment" style="display:none" onchange="handleFileSelect(event,\''+id+'\')"></div>';}
function getPhotoValue(id){if(pendingPhotoData&&pendingPhotoData.fieldId===id)return '__PENDING_UPLOAD__';var u=document.getElementById(id+'_url');if(u&&u.value.trim())return u.value.trim();return '';}
function triggerCamera(id){var i=document.getElementById(id+'_camera');if(i)i.click();}
function triggerGallery(id){var i=document.getElementById(id+'_file');if(i)i.click();}
function toggleUrlInput(id){var w=document.getElementById(id+'_url_wrap');if(w)w.classList.toggle('visible');}
function handleFileSelect(ev,id){var file=ev.target.files[0];if(!file)return;if(!file.type.startsWith('image/')){showToast('⚠️ Избери снимка');return;}if(file.size>10*1024*1024){showToast('⚠️ Макс. 10MB');return;}var area=document.getElementById(id+'_area');if(area){area.classList.add('has-photo');area.innerHTML='<div class="photo-uploading"><span class="spinner"></span> Зареждам...</div>';}compressImage(file,function(b64,mime){pendingPhotoData={fieldId:id,base64:b64,fileName:'photo_'+Date.now()+'.jpg',mimeType:mime||'image/jpeg'};if(area)area.innerHTML='<img class="photo-upload-preview" src="data:'+mime+';base64,'+b64+'"><button type="button" class="photo-remove-btn" onclick="removePhoto(\''+id+'\',event)">✕</button>';});}
function compressImage(file,cb){var r=new FileReader();r.onload=function(e){var img=new Image();img.onload=function(){var c=document.createElement('canvas'),mx=1200,w=img.width,h=img.height;if(w>mx||h>mx){if(w>h){h=Math.round(h*mx/w);w=mx;}else{w=Math.round(w*mx/h);h=mx;}}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);var d=c.toDataURL('image/jpeg',0.8);cb(d.split(',')[1],'image/jpeg');};img.src=e.target.result;};r.readAsDataURL(file);}
function removePhoto(id,ev){if(ev)ev.stopPropagation();pendingPhotoData=null;var area=document.getElementById(id+'_area');if(area){area.classList.remove('has-photo');area.innerHTML='<div class="photo-upload-icon">📷</div><div class="photo-upload-text">Натисни за снимка</div><div class="photo-upload-hint">Камера, галерия или линк</div>';}['_file','_camera'].forEach(function(s){var i=document.getElementById(id+s);if(i)i.value='';});}

let voiceRecognition = null; let isRecording = false;
function loadNotes(){var el=document.getElementById('notesActiveList');if(el)el.innerHTML='<div class="text-center mt-16"><span class="spinner"></span></div>';google.script.run.withSuccessHandler(renderNotes).withFailureHandler(function(e){showToast('⚠️ '+e.message);}).getNotes();}
function renderNotes(data){if(!data)return;var activeEl=document.getElementById('notesActiveList');var doneEl=document.getElementById('notesDoneList');if(activeEl){if(data.active&&data.active.length){activeEl.innerHTML=data.active.map(function(n){return renderNoteCard(n,false);}).join('');}else{activeEl.innerHTML='<div class="empty-state"><div class="empty-state-icon">📝</div><div class="empty-state-text">Няма активни бележки</div></div>';}}if(doneEl){if(data.done&&data.done.length){doneEl.innerHTML=data.done.map(function(n){return renderNoteCard(n,true);}).join('');}else{doneEl.innerHTML='<div class="empty-state"><div class="empty-state-text">Няма завършени бележки</div></div>';}}var badge=document.getElementById('navNotesBadge');if(badge){if(data.active&&data.active.length>0){badge.textContent=data.active.length;badge.style.display='flex';}else badge.style.display='none';}}
function renderNoteCard(n,isDone){var prioCls=n.priority==='Високо'?'prio-high':n.priority==='Ниско'?'prio-low':'prio-medium';var prioLabel=n.priority==='Високо'?'high':n.priority==='Ниско'?'low':'medium';var photoHtml=n.photo?'<img class="note-photo" src="'+esc(n.photo)+'" loading="lazy" onerror="this.style.display=\'none\'">':'';return '<div class="note-card '+(isDone?'done ':'')+prioCls+'"><button class="note-check '+(isDone?'checked':'')+'" onclick="toggleNote(\''+esc(n.id)+'\')">'+(isDone?'✓':'')+'</button><div class="note-body"><div class="note-text">'+esc(n.text)+'</div><div class="note-meta"><span class="note-date">'+esc(n.date)+'</span><span class="note-prio-badge '+prioLabel+'">'+esc(n.priority||'Средно')+'</span></div></div>'+photoHtml+'<button class="note-delete" onclick="deleteNoteConfirm(\''+esc(n.id)+'\')">🗑️</button></div>';}

function switchNotesTab(tab){document.querySelectorAll('#sec-notes .tab').forEach(function(t){t.classList.remove('active');});document.querySelectorAll('#sec-notes .tab').forEach(function(t){if(t.getAttribute('data-tab')==='notes-'+tab)t.classList.add('active');});document.getElementById('notesActiveList').style.display=(tab==='active')?'flex':'none';document.getElementById('notesDoneList').style.display=(tab==='done')?'flex':'none';}

function toggleVoiceInput(){if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){showToast('⚠️ Гласовият вход не се поддържа');return;}if(isRecording){stopVoice();return;}var SR=window.SpeechRecognition||window.webkitSpeechRecognition;voiceRecognition=new SR();voiceRecognition.lang='bg-BG';voiceRecognition.continuous=false;voiceRecognition.interimResults=true;var vb=document.getElementById('voiceBtn'),st=document.getElementById('voiceStatus'),inp=document.getElementById('quickNoteInput');voiceRecognition.onstart=function(){isRecording=true;if(vb)vb.classList.add('recording');if(st){st.style.display='block';st.textContent='🔴 Говори сега...';}};voiceRecognition.onresult=function(event){var tr='';for(var i=event.resultIndex;i<event.results.length;i++){tr+=event.results[i][0].transcript;}if(inp)inp.value=tr;};voiceRecognition.onerror=function(event){stopVoice();if(event.error==='no-speech')showToast('⚠️ Не чух нищо');else if(event.error==='not-allowed')showToast('⚠️ Разреши микрофона');else showToast('⚠️ '+event.error);};voiceRecognition.onend=function(){stopVoice();};voiceRecognition.start();}
function stopVoice(){isRecording=false;if(voiceRecognition){try{voiceRecognition.stop();}catch(e){}}var vb=document.getElementById('voiceBtn');if(vb)vb.classList.remove('recording');var st=document.getElementById('voiceStatus');if(st)st.style.display='none';}
document.addEventListener('keydown',function(e){if(e.key==='Enter'&&document.activeElement&&document.activeElement.id==='quickNoteInput'){e.preventDefault();quickAddNote();}});

function closeModal(type){if(type==='form'){var m=document.getElementById('formModal');if(m)m.style.display='none';pendingPhotoData=null;bulkSelection={};bulkType=null;}}
document.addEventListener('click',function(e){if(e.target.classList.contains('modal-overlay'))e.target.style.display='none';});

var LANDING_URL = 'https://momorganizer.eu/memories';
function shareApp(){showQRModal();}
function showQRModal(){document.getElementById('qrModal').style.display='flex';document.getElementById('shareLinkInput').value=LANDING_URL;generateQR(LANDING_URL);}
function copyShareLink(){var val=document.getElementById('shareLinkInput').value;if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(val).then(function(){showToast('✅ Линкът е копиран!');}).catch(function(){showToast('⚠️ Копирай ръчно');});}else{var input=document.getElementById('shareLinkInput');input.select();try{document.execCommand('copy');showToast('✅ Копиран!');}catch(e){showToast('⚠️ Копирай ръчно');}}}
function generateQR(text){var canvas=document.getElementById('qrCanvas');if(!canvas)return;var size=200;canvas.width=size;canvas.height=size;var ctx=canvas.getContext('2d');ctx.fillStyle='#FDE8F0';ctx.fillRect(0,0,size,size);ctx.fillStyle='#8A6B6B';ctx.font='14px DM Sans,sans-serif';ctx.textAlign='center';ctx.fillText('Зареждам QR...',size/2,size/2);var img=new Image();img.crossOrigin='anonymous';img.onload=function(){ctx.clearRect(0,0,size,size);ctx.drawImage(img,0,0,size,size);};img.onerror=function(){ctx.fillStyle='#FDE8F0';ctx.fillRect(0,0,size,size);ctx.fillStyle='#3D2B2B';ctx.font='13px DM Sans,sans-serif';ctx.textAlign='center';ctx.fillText('Копирай линка отдолу',size/2,size/2-5);ctx.fillText('и го изпрати 💝',size/2,size/2+15);};img.src='https://api.qrserver.com/v1/create-qr-code/?size='+size+'x'+size+'&data='+encodeURIComponent(text)+'&format=png&margin=10';}
</script>
